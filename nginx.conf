worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $request_time "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;  # hide nginx version

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/xml application/json
    application/javascript application/xml+rss
    image/svg+xml;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # Never cache index.html (so PWA updates are picked up)
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      expires 0;
    }

    # React Router — all routes fall back to index.html
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI backend
    # On Render: backend internal URL is the service's private URL
    location /api/ {
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;     # large PDF downloads need time
      proxy_send_timeout 120s;
      proxy_buffering off;         # stream PDF bytes immediately
      client_max_body_size 1000m;  # allow large PDF uploads
    }

    # Health check endpoint (Render uses this)
    location = /health {
      return 200 "ok";
      add_header Content-Type text/plain;
      access_log off;
    }
  }
}
